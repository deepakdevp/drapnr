name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build for"
        required: true
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: "Build profile"
        required: false
        type: choice
        default: preview
        options:
          - preview
          - production

jobs:
  build:
    name: EAS Build (${{ inputs.platform }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "9"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine profile
        id: profile
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ inputs.profile }}" = "production" ]; then
            echo "name=production" >> "$GITHUB_OUTPUT"
          else
            echo "name=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (iOS)
        if: inputs.platform == 'ios' || inputs.platform == 'all'
        run: eas build --platform ios --profile ${{ steps.profile.outputs.name }} --non-interactive

      - name: Build (Android)
        if: inputs.platform == 'android' || inputs.platform == 'all'
        run: eas build --platform android --profile ${{ steps.profile.outputs.name }} --non-interactive
